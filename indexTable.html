<!DOCTYPE html>
<html>
    <head>
        <title>Browser</title>
        <link rel="icon" type="image/png" href="images/favicon/cleopatra.png"></link>
        <link rel="stylesheet" href="designs/styleIndex.css">
    </head>

    <body>

        <main>

            <img id="cleo" src="images/favicon/cleopatra.png" alt="The icon image of Cleopatra">
            <div id="entry-box" contenteditable="true"></div>
            <button id="send" onclick="location.href='websiteTable.html'">Enter</button>

            <div id="dropdown">
                <button type="button">
                    <img id= "menu" src="images/menu_icon.jpg"
                    alt="Button Image" style="width: 50px; height: 50px;">
                </button>
                <div id="content">
                    <div onclick="location.reload()">New Tab</div>
                    <div onclick="alert('Zoomed in')">Zoom In</div>
                    <div onclick="alert('Zoomed out')">Zoom Out</div>
                    <div onclick="alert('History page')">History</div>
                    <div onclick="alert('Browse Privately')">Incognito</div>
                    <div onclick="location.href='settings.html'">Settings</div>
                    <div onclick="alert('Saved Websites')">Bookmarks</div>
                </div>
            </div>

            <button type="button"onclick="alert('Nothing back')">
                <img id= "arrow-back" src="images/arrow_img_left.jpg"
                alt="Button Image" style="width: 50px; height: 50px;">
            </button>

            <button type="button"onclick="location.href='websiteTable.html'">
                <img id= "arrow-front" src="images/arrow_img_right.jpg"
                alt="Button Image" style="width: 50px; height: 50px;">
            </button>

            <button type="button"onclick="location.reload()">
                <img id= "home" src="images/home_icon.png"
                alt="Home Image" style="width: 50px; height: 50px;">
            </button>




            <button type="button"onclick="location.href='https://pytorch.org/'">
                <img id= "pytorch" src="images/pytorch.png"
                alt="Button Image" style="width: 50px; height: 50px;">
            </button>

            <button type="button"onclick="location.href='https://github.com/'">
                <img id= "github" src="images/github.png"
                alt="Button Image" style="width: 50px; height: 50px;">
            </button>

            <button type="button"onclick="location.href='https://signin.aws.amazon.com/signup?request_type=register'">
                <img id= "AWS" src="images/ACC.png"
                alt="Home Image" style="width: 50px; height: 50px;">
            </button>

        </main>

    </body>
</html>
