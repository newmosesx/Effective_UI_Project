<!DOCTYPE html>
<html>
    <head>
        <title>Browser</title>
        <link rel="icon" type="image/png" href="images/favicon/cleopatra.png"></link>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <main class="infrence-container">
            <img id="cleo" src="images/favicon/cleopatra.png" alt="The icon image of Cleopatra">
            <div class="history" id="chat-history">
            </div>
            <div class="entry-box" id="user-input" contenteditable="true"></div>
            <button class="send" id="send-entry">Enter</button>

            <button type="button"onclick="alert('Image Button clicked!')">
                <img class= "menu" src="images/menu_icon.jpg"
                alt="Button Image" style="width: 50px; height: 50px;">
            </button>

            <button type="button"onclick="alert('Image Button clicked!')">
                <img class= "arrow-back" src="images/arrow_img_left.jpg"
                alt="Button Image" style="width: 50px; height: 50px;">
            </button>

            <button type="button"onclick="alert('Image Button clicked!')">
                <img class= "arrow-front" src="images/arrow_img_right.jpg"
                alt="Button Image" style="width: 50px; height: 50px;">
            </button>

            <button type="button"onclick="alert('Image Button clicked!')">
                <img class= "home" src="images/home_icon.png"
                alt="Home Image" style="width: 50px; height: 50px;">
            </button>




            <button type="button"onclick="location.href='https://pytorch.org/'">
                <img class= "pytorch" src="images/pytorch.png"
                alt="Button Image" style="width: 50px; height: 50px;">
            </button>

            <button type="button"onclick="alert('Image Button clicked!')">
                <img class= "github" src="images/github.png"
                alt="Button Image" style="width: 50px; height: 50px;">
            </button>

            <button type="button"onclick="alert('Image Button clicked!')">
                <img class= "AWS" src="images/ACC.png"
                alt="Home Image" style="width: 50px; height: 50px;">
            </button>




        </main>

        <script src="show-event.js"> </script>

    </body>
</html>
